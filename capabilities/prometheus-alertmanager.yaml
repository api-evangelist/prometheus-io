naftiko: 1.0.0-alpha2
info:
  label: Prometheus Alertmanager — API v2
  description: 'Prometheus Alertmanager HTTP API v2 capability. Lets clients post alerts,
    list firing/grouped alerts, manage silences, list receivers, and inspect cluster
    status. Backed by the generated OpenAPI spec at prometheus/alertmanager
    api/v2/openapi.yaml.'
  tags:
  - Alertmanager
  - Alerts
  - Silences
  - Receivers
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ALERTMANAGER_BASE_URL: ALERTMANAGER_BASE_URL
capability:
  consumes:
  - type: http
    namespace: prometheus-alertmanager
    baseUri: '{{env.ALERTMANAGER_BASE_URL}}'
    description: Alertmanager v2 surface.
    resources:
    - name: status
      path: /api/v2/status
      operations:
      - name: get-status
        method: GET
        description: Return Alertmanager and cluster status.
        outputRawFormat: json
    - name: receivers
      path: /api/v2/receivers
      operations:
      - name: list-receivers
        method: GET
        description: List configured notification receivers.
        outputRawFormat: json
    - name: alerts
      path: /api/v2/alerts
      operations:
      - name: list-alerts
        method: GET
        description: List currently active alerts, optionally filtered.
        outputRawFormat: json
      - name: post-alerts
        method: POST
        description: Push one or more alerts into Alertmanager.
        outputRawFormat: json
    - name: alerts-groups
      path: /api/v2/alerts/groups
      operations:
      - name: list-alert-groups
        method: GET
        description: Return alerts grouped by Alertmanager's grouping rules.
        outputRawFormat: json
    - name: silences
      path: /api/v2/silences
      operations:
      - name: list-silences
        method: GET
        description: List current silences.
        outputRawFormat: json
      - name: create-silence
        method: POST
        description: Create a new silence.
        outputRawFormat: json
    - name: silence
      path: /api/v2/silence/{silenceID}
      operations:
      - name: get-silence
        method: GET
        description: Fetch one silence by ID.
        outputRawFormat: json
      - name: delete-silence
        method: DELETE
        description: Expire / delete a silence by ID.
        outputRawFormat: json
    authentication:
      type: none
