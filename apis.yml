description: Prometheus is a Cloud Native Computing Foundation graduated open source systems
  monitoring and alerting toolkit. A Prometheus server scrapes metrics over HTTP from instrumented
  targets, stores them in an embedded time series database, and lets operators query, alert,
  and aggregate them with the PromQL query language. The project pairs the Prometheus server
  with Alertmanager for alert routing and silencing, official client libraries for Go, Java,
  Python, Ruby, and Rust, and a large ecosystem of exporters (node, blackbox, snmp, statsd,
  jmx, mysqld, cloudwatch, consul, graphite, memcached, pushgateway, etc.) for pulling metrics
  out of existing systems. Prometheus also drives the OpenMetrics exposition format and an
  experimental Remote Write 2.0 protocol for shipping samples to long-term storage backends.
