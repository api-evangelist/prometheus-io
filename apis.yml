apis:
- aid: prometheus-io:prometheus-server-api
  name: Prometheus Server HTTP API
  tags:
  - Metrics
  - PromQL
  - Query
  - Monitoring
  humanURL: https://prometheus.io/docs/prometheus/latest/querying/api/
  baseURL: http://localhost:9090/api/v1
  description: The HTTP API exposed by every Prometheus server under /api/v1. Lets clients
    evaluate instant and range PromQL queries, list and search series, labels and metric
    metadata, inspect targets, scrape pools, rules, active alerts, alertmanagers, status,
    TSDB stats, WAL replay, build/runtime info, server-side notifications, and the live
    feature set. Also includes admin endpoints behind --web.enable-admin-api for snapshots,
    series deletion, and tombstone clean-up, plus optional remote read/write and OTLP
    metrics receivers. Stable v1 with non-breaking additions; experimental endpoints
    (parse_query, query_exemplars, targets/relabel_steps, status/tsdb/blocks, notifications)
    are clearly marked.
  properties:
  - url: https://prometheus.io/docs/prometheus/latest/querying/api/
    type: Documentation
  - url: https://prometheus.io/docs/prometheus/latest/querying/basics/
    type: Documentation
    name: PromQL Basics
  - url: https://prometheus.io/docs/prometheus/latest/querying/operators/
    type: Documentation
    name: PromQL Operators
  - url: https://prometheus.io/docs/prometheus/latest/querying/functions/
    type: Documentation
    name: PromQL Functions
  - url: openapi/prometheus-server-api-openapi.yml
    type: OpenAPI
  - url: json-schema/prometheus-query-result-schema.json
    type: JSONSchema
  - url: json-schema/prometheus-target-schema.json
    type: JSONSchema
  - url: json-ld/prometheus-io-context.jsonld
    type: JSONLD
  - url: examples/prometheus-query-example.json
    type: Example
  - url: examples/prometheus-query-range-example.json
    type: Example
  - url: examples/prometheus-targets-example.json
    type: Example
  - type: NaftikoCapability
    url: capabilities/prometheus-query.yaml
  - type: NaftikoCapability
    url: capabilities/prometheus-metadata.yaml
  - type: NaftikoCapability
    url: capabilities/prometheus-targets.yaml
  - type: NaftikoCapability
    url: capabilities/prometheus-rules-alerts.yaml
  - type: NaftikoCapability
    url: capabilities/prometheus-status.yaml
  - type: NaftikoCapability
    url: capabilities/prometheus-admin-tsdb.yaml
- aid: prometheus-io:prometheus-alertmanager-api
  name: Prometheus Alertmanager API v2
  tags:
  - Alerts
  - Silences
  - Notifications
  - Receivers
  - Cluster
  humanURL: https://github.com/prometheus/alertmanager
  baseURL: http://localhost:9093/api/v2
  description: Alertmanager's HTTP API v2 — the canonical interface for posting alerts,
    listing and grouping firing/inhibited/silenced alerts, managing silences, listing
    configured receivers, and inspecting cluster status. Spec is generated with go-swagger
    from api/v2/openapi.yaml in the alertmanager repo and consumed by the Alertmanager UI
    and external integrations.
  properties:
  - url: https://github.com/prometheus/alertmanager/blob/main/api/v2/openapi.yaml
    type: Documentation
  - url: https://prometheus.io/docs/alerting/latest/alertmanager/
    type: Documentation
    name: Alertmanager Overview
  - url: openapi/prometheus-alertmanager-api-openapi.yml
    type: OpenAPI
  - type: NaftikoCapability
    url: capabilities/prometheus-alertmanager.yaml
- aid: prometheus-io:prometheus-remote-write
  name: Prometheus Remote Write
  tags:
  - Remote Write
  - Ingest
  - Protocol Buffers
  - Streaming
  humanURL: https://prometheus.io/docs/specs/prw/remote_write_spec_2_0/
  description: Remote Write is Prometheus' push protocol for shipping scraped samples to
    long-term storage and analysis backends (Cortex, Thanos, Mimir, VictoriaMetrics,
    InfluxDB, Datadog, etc.). Snappy-compressed protocol-buffer payloads POSTed over HTTP.
    Version 1.0 is stable and widely implemented; version 2.0 (experimental specification)
    adds native histograms, metadata-per-series, created timestamps, and tighter validation.
  properties:
  - url: https://prometheus.io/docs/specs/prw/remote_write_spec/
    type: Documentation
    name: Remote Write 1.0 Specification
  - url: https://prometheus.io/docs/specs/prw/remote_write_spec_2_0/
    type: Documentation
    name: Remote Write 2.0 Specification
  - url: https://github.com/prometheus/prometheus/blob/main/prompb/remote.proto
    type: ProtoBuf
    name: remote.proto
- aid: prometheus-io:prometheus-exposition-format
  name: Prometheus Exposition Format / OpenMetrics
  tags:
  - Exposition
  - OpenMetrics
  - Scraping
  - Metrics Format
  humanURL: https://prometheus.io/docs/instrumenting/exposition_formats/
  description: The text-based exposition format that every instrumented target exposes
    (typically on /metrics) and that the Prometheus server scrapes over HTTP. The format
    evolved into OpenMetrics, a CNCF Sandbox specification that is the standardized
    successor; both are scrape-compatible with Prometheus. Defines counters, gauges,
    histograms, summaries, and (in OpenMetrics) info, stateset, gaugehistogram, and
    exemplars.
  properties:
  - url: https://prometheus.io/docs/instrumenting/exposition_formats/
    type: Documentation
  - url: https://openmetrics.io/
    type: Documentation
    name: OpenMetrics
  - url: https://github.com/prometheus/OpenMetrics
    type: SourceCode
    name: prometheus/OpenMetrics
- aid: prometheus-io:prometheus-otlp-receiver
  name: Prometheus OTLP Metrics Receiver
  tags:
  - OTLP
  - OpenTelemetry
  - Receiver
  - Ingest
  humanURL: https://prometheus.io/docs/prometheus/latest/feature_flags/
  description: Optional OpenTelemetry Protocol metrics receiver exposed on /api/v1/otlp/v1/metrics
    when the Prometheus server is started with --web.enable-otlp-receiver. Accepts OTLP/HTTP
    protobuf payloads from OpenTelemetry Collectors and SDKs; delta-to-cumulative conversion
    is available behind --enable-feature=otlp-deltatocumulative.
  properties:
  - url: https://prometheus.io/docs/guides/opentelemetry/
    type: Documentation
    name: OpenTelemetry Guide
  - url: https://github.com/open-telemetry/opentelemetry-proto
    type: SourceCode
    name: OTLP Protocol Buffers
